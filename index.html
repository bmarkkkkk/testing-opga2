<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OPGA Invitational</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── CSS Variables ── */
    :root {
      --green-900: #0a1f14;
      --green-800: #0f2e1d;
      --green-700: #143d27;
      --green-600: #1a5235;
      --green-500: #006747;
      --green-400: #1e8a5e;
      --green-300: #3eb97f;
      --cream: #f5f0e8;
      --cream-dim: #e8e2d6;
      --gold: #c9a84c;
      --gold-light: #dfc373;
      --red: #d44;
      --red-dim: rgba(221,68,68,0.15);
      --blue: #4a90d9;
      --blue-dim: rgba(74,144,217,0.15);
      --text-primary: #f5f0e8;
      --text-secondary: #a8b5a0;
      --text-muted: #6b7a64;
      --surface-0: var(--green-900);
      --surface-1: var(--green-800);
      --surface-2: var(--green-700);
      --surface-3: var(--green-600);
      --border: rgba(245,240,232,0.08);
      --border-bright: rgba(245,240,232,0.15);
      --radius: 10px;
      --radius-sm: 6px;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
      --transition: 0.2s ease;
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      background: var(--surface-0);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Background texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(0,103,71,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(30,138,94,0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Grain overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 0 16px 100px; }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 36px 0 20px;
      position: relative;
    }
    .header-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.2);
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 2.4rem;
      letter-spacing: -0.02em;
      color: var(--cream);
      line-height: 1.1;
    }
    .header-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 300;
    }

    /* ── Live Pulse ── */
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--green-300);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(62,185,127,0.5); }
      50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(62,185,127,0); }
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 16px 0 24px;
    }
    .ctrl-group {
      display: flex;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 8px 14px;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      position: relative;
    }
    .ctrl-btn:hover { color: var(--text-primary); background: var(--surface-2); }
    .ctrl-btn.active {
      color: var(--cream);
      background: var(--green-500);
    }
    .ctrl-btn + .ctrl-btn { border-left: 1px solid var(--border); }

    /* ── Section ── */
    .section {
      margin-bottom: 28px;
      animation: fadeUp 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 0 2px;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1.15rem;
      color: var(--cream);
      letter-spacing: 0.01em;
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border-bright);
    }
    .section-badge {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* ── Cards ── */
    .card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    /* ── Team Standings ── */
    .team-row {
      display: grid;
      grid-template-columns: 36px 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      transition: background var(--transition);
    }
    .team-row:not(:last-child) { border-bottom: 1px solid var(--border); }
    .team-rank {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--gold);
      text-align: center;
    }
    .team-rank.rank-1 { color: var(--gold); }
    .team-rank.rank-2 { color: var(--text-secondary); }
    .team-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-primary);
    }
    .team-thru {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .team-score {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      text-align: right;
      min-width: 48px;
    }
    .team-score.under { color: var(--green-300); }
    .team-score.over { color: var(--red); }
    .team-score.even { color: var(--text-primary); }

    .last-nine-badge {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .last-nine-badge.under { background: rgba(62,185,127,0.15); color: var(--green-300); }
    .last-nine-badge.over { background: var(--red-dim); color: var(--red); }
    .last-nine-badge.even { background: rgba(245,240,232,0.08); color: var(--text-secondary); }

    /* ── Individual Leaderboard ── */
    .lb-header {
      display: grid;
      grid-template-columns: 32px 1fr 54px 62px 54px 40px;
      gap: 4px;
      padding: 10px 14px;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    .lb-row {
      display: grid;
      grid-template-columns: 32px 1fr 54px 62px 54px 40px;
      gap: 4px;
      padding: 12px 14px;
      align-items: center;
      cursor: pointer;
      transition: background var(--transition);
    }
    .lb-row:hover { background: var(--surface-2); }
    .lb-row:not(:last-child) { border-bottom: 1px solid var(--border); }
    .lb-pos {
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .lb-pos.top-3 { color: var(--gold); }
    .lb-name-cell {}
    .lb-player-name {
      font-weight: 600;
      font-size: 0.88rem;
      color: var(--text-primary);
    }
    .lb-team-tag {
      font-size: 0.62rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .lb-val {
      text-align: right;
      font-size: 0.85rem;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .lb-val.net-par { font-weight: 700; }
    .lb-val.net-par.under { color: var(--green-300); }
    .lb-val.net-par.over { color: var(--red); }
    .lb-val.net-par.even { color: var(--text-primary); }
    .lb-thru {
      text-align: right;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 400;
    }
    .arrow {
      display: inline-block;
      font-size: 0.7rem;
      margin-left: 4px;
      vertical-align: middle;
    }
    .arrow.up { color: var(--green-300); }
    .arrow.down { color: var(--red); }

    /* ── Chart ── */
    .chart-wrap {
      padding: 16px;
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .chart-wrap canvas { width: 100% !important; }

    /* ── Tournament History ── */
    .history-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 480px) { .history-grid { grid-template-columns: 1fr; } }
    .history-card {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }
    .history-card-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--cream);
      margin-bottom: 8px;
    }
    .history-upcoming {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-style: italic;
    }
    .history-place {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 0.8rem;
    }
    .history-place:not(:last-child) { border-bottom: 1px solid var(--border); }
    .history-medal { font-weight: 600; margin-right: 6px; }
    .history-medal.gold { color: var(--gold); }
    .history-medal.silver { color: var(--text-secondary); }
    .history-place-score {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* ── Handicap Table ── */
    .hc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .hc-table th {
      text-align: left;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 10px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    .hc-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
    }
    .hc-table tr:last-child td { border-bottom: none; }
    .hc-name { font-weight: 600; color: var(--text-primary); }
    .hc-val { color: var(--text-secondary); text-align: center; }

    /* ── Player Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      justify-content: center;
      align-items: flex-end;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
      background: var(--surface-1);
      border: 1px solid var(--border-bright);
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px 20px 32px;
      animation: slideUp 0.3s ease;
      box-shadow: var(--shadow-lg);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--text-muted);
      border-radius: 2px;
      margin: 0 auto 16px;
      opacity: 0.5;
    }
    .modal-player-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--cream);
      text-align: center;
    }
    .modal-team-name {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
      margin-bottom: 16px;
    }
    .modal-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .modal-stat {
      background: var(--surface-2);
      border-radius: var(--radius-sm);
      padding: 10px 8px;
      text-align: center;
    }
    .modal-stat-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .modal-stat-val {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text-primary);
    }
    .modal-rounds-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .modal-round-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-round-row:last-child { border-bottom: none; }
    .modal-round-label { color: var(--text-secondary); font-weight: 500; }
    .modal-round-val { font-weight: 600; font-variant-numeric: tabular-nums; }
    .modal-summary {
      margin-top: 12px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 32px 0 20px;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* ── Loading ── */
    .loading-msg {
      text-align: center;
      padding: 40px 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      html { font-size: 14px; }
      .header h1 { font-size: 2rem; }
      .ctrl-btn { padding: 7px 10px; font-size: 0.72rem; }
      .lb-header, .lb-row {
        grid-template-columns: 28px 1fr 46px 54px 46px 36px;
        gap: 2px;
        padding: 10px 10px;
      }
    }

    /* ── No data state ── */
    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-badge"><span class="live-dot"></span>Live Scoring</div>
      <h1>OPGA Invitational</h1>
      <div class="header-sub" id="lastUpdate">Connecting…</div>
    </header>

    <!-- View Controls -->
    <div class="controls">
      <div class="ctrl-group" id="viewBtns">
        <button class="ctrl-btn active" data-view="tournament">Tournament</button>
        <button class="ctrl-btn" data-view="1">R1</button>
        <button class="ctrl-btn" data-view="2">R2</button>
        <button class="ctrl-btn" data-view="3">R3</button>
        <button class="ctrl-btn" data-view="4">R4</button>
      </div>
    </div>

    <!-- Team Standings -->
    <div class="section" id="teamSection">
      <div class="section-head">
        <span class="section-title">Team Standings</span>
        <span class="section-line"></span>
        <span class="section-badge">Net</span>
      </div>
      <div class="card" id="teamCard">
        <div class="loading-msg">Loading teams…</div>
      </div>
    </div>

    <!-- Team Lead Chart -->
    <div class="section" id="chartSection">
      <div class="section-head">
        <span class="section-title">Team Lead Chart</span>
        <span class="section-line"></span>
      </div>
      <div class="chart-wrap">
        <canvas id="leadChart" height="200"></canvas>
      </div>
    </div>

    <!-- Individual Leaderboard -->
    <div class="section" id="individualSection">
      <div class="section-head">
        <span class="section-title">Individual Leaderboard</span>
        <span class="section-line"></span>
      </div>
      <div class="card" id="individualCard">
        <div class="lb-header">
          <span>#</span><span>Player</span><span style="text-align:right">Net</span><span style="text-align:right">To Par</span><span style="text-align:right">Gross</span><span style="text-align:right">Thru</span>
        </div>
        <div id="lbBody"><div class="loading-msg">Loading players…</div></div>
      </div>
    </div>

    <!-- Tournament History -->
    <div class="section" id="historySection">
      <div class="section-head">
        <span class="section-title">Tournament History</span>
        <span class="section-line"></span>
      </div>
      <div class="history-grid" id="historyGrid"></div>
    </div>

    <!-- Handicaps by Round -->
    <div class="section" id="hcSection">
      <div class="section-head">
        <span class="section-title">Handicaps by Round</span>
        <span class="section-line"></span>
      </div>
      <div class="card" style="overflow-x:auto">
        <table class="hc-table" id="hcTable">
          <thead><tr><th>Player</th><th>HI</th><th>CH R1</th><th>CH R2</th><th>CH R3</th><th>CH R4</th></tr></thead>
          <tbody id="hcBody"></tbody>
        </table>
      </div>
    </div>

    <div class="footer">OPGA Invitational &middot; Live Leaderboard</div>
  </div>

  <!-- Player Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-sheet" id="modalSheet">
      <div class="modal-handle"></div>
      <div class="modal-player-name" id="modalName"></div>
      <div class="modal-team-name" id="modalTeam"></div>
      <div class="modal-stats" id="modalStats"></div>
      <div class="modal-rounds-title" id="modalRoundsTitle"></div>
      <div id="modalRounds"></div>
      <div class="modal-summary" id="modalSummary"></div>
    </div>
  </div>

  <script>
/* ═══════════════════════════════════════════════════
   OPGA Invitational — Live Leaderboard
   ═══════════════════════════════════════════════════ */

// ── CONFIG ──
const SHEET_ID = '1YlBAFaODGvwT49IxAOgCjgAJgC2Xw9R9XJLolAuveGU';
const POLL_SECONDS = 5;
const TABS = { scores: 'Scores', courses: 'Courses', rounds: 'Rounds' };

function csvUrl(tab) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab)}`;
}

// ── STATE ──
let currentView = 'tournament';  // 'tournament' | '1' | '2' | '3' | '4'
let players = [];
let courses = {};    // { courseName: { par, rating, slope } }
let roundMap = {};   // { '1': courseName, '2': courseName, … }
let prevRanks = {};  // for arrow logic
let chartInstance = null;
let lastCSV = '';

// ── CSV PARSER ──
function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const row = [];
    let inQuote = false, cell = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (inQuote) {
        if (c === '"' && line[i+1] === '"') { cell += '"'; i++; }
        else if (c === '"') inQuote = false;
        else cell += c;
      } else {
        if (c === '"') inQuote = true;
        else if (c === ',') { row.push(cell.trim()); cell = ''; }
        else cell += c;
      }
    }
    row.push(cell.trim());
    rows.push(row);
  }
  return rows;
}

// ── FETCH DATA ──
async function fetchTab(tab) {
  try {
    const r = await fetch(csvUrl(tab), { cache: 'no-store' });
    if (!r.ok) return [];
    const text = await r.text();
    return parseCSV(text);
  } catch { return []; }
}

async function load() {
  const [scoresRaw, coursesRaw, roundsRaw] = await Promise.all([
    fetchTab(TABS.scores), fetchTab(TABS.courses), fetchTab(TABS.rounds)
  ]);

  // Check if data actually changed
  const csv = JSON.stringify(scoresRaw);
  if (csv === lastCSV) return;
  lastCSV = csv;

  // Parse Courses
  if (coursesRaw.length > 1) {
    courses = {};
    for (let i = 1; i < coursesRaw.length; i++) {
      const r = coursesRaw[i];
      if (r[0]) courses[r[0].trim()] = { par: num(r[1]), rating: num(r[2]), slope: num(r[3]) };
    }
  }

  // Parse Rounds
  if (roundsRaw.length > 1) {
    roundMap = {};
    for (let i = 1; i < roundsRaw.length; i++) {
      const r = roundsRaw[i];
      if (r[0] && r[1]) {
        const rNum = r[0].replace(/[^0-9]/g, '');
        roundMap[rNum] = r[1].trim();
      }
    }
  }

  // Parse Scores
  if (scoresRaw.length > 1) {
    players = [];
    for (let i = 1; i < scoresRaw.length; i++) {
      const r = scoresRaw[i];
      if (!r[0] || !r[0].trim()) continue;
      players.push({
        name: r[0].trim(),
        hi: num(r[1]),
        team: (r[2] || '').trim(),
        rounds: {
          '1': { front: num(r[3]), back: num(r[4]) },
          '2': { front: num(r[5]), back: num(r[6]) },
          '3': { front: num(r[7]), back: num(r[8]) },
          '4': { front: num(r[9]), back: num(r[10]) }
        }
      });
    }
  }

  render();
  document.getElementById('lastUpdate').textContent =
    'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function num(v) {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

// ── COURSE HANDICAP ──
function getCH(hi, roundNum) {
  const courseName = roundMap[String(roundNum)];
  if (!courseName || !courses[courseName]) return 0;
  const c = courses[courseName];
  return Math.round(hi * (c.slope / 113) + (c.rating - c.par));
}

function getCoursePar(roundNum) {
  const courseName = roundMap[String(roundNum)];
  if (!courseName || !courses[courseName]) return 72;
  return courses[courseName].par;
}

// ── NET SCORING ──
function calcPlayerRound(player, roundNum) {
  const r = player.rounds[String(roundNum)];
  if (!r) return null;
  const fg = r.front, bg = r.back;
  const hasFront = fg > 0, hasBack = bg > 0;
  if (!hasFront && !hasBack) return null;

  const ch = getCH(player.hi, roundNum);
  const par = getCoursePar(roundNum);
  const frontHcStrokes = Math.ceil(ch / 2);
  const backHcStrokes = Math.floor(ch / 2);

  const frontNet = hasFront ? fg - frontHcStrokes : 0;
  const backNet = hasBack ? bg - backHcStrokes : 0;
  const frontGross = hasFront ? fg : 0;
  const backGross = hasBack ? bg : 0;

  const thru = (hasFront ? 9 : 0) + (hasBack ? 9 : 0);
  const net = frontNet + backNet;
  const gross = frontGross + backGross;
  const parForHoles = (hasFront && hasBack) ? par : par / 2;
  const netToPar = net - parForHoles;

  return { net, gross, thru, netToPar, frontGross, backGross, frontNet, backNet, ch, hasFront, hasBack };
}

function calcPlayerView(player, view) {
  if (view === 'tournament') {
    let totalNet = 0, totalGross = 0, totalThru = 0, totalNetToPar = 0;
    const roundResults = {};
    for (let rn = 1; rn <= 4; rn++) {
      const res = calcPlayerRound(player, rn);
      roundResults[rn] = res;
      if (res) {
        totalNet += res.net;
        totalGross += res.gross;
        totalThru += res.thru;
        totalNetToPar += res.netToPar;
      }
    }
    return { net: totalNet, gross: totalGross, thru: totalThru, netToPar: totalNetToPar, roundResults };
  } else {
    const res = calcPlayerRound(player, parseInt(view));
    if (!res) return { net: 0, gross: 0, thru: 0, netToPar: 0, roundResults: {} };
    return { ...res, roundResults: { [parseInt(view)]: res } };
  }
}

// ── FORMAT ──
function fmtPar(val) {
  if (val === 0) return 'E';
  return val > 0 ? `+${val}` : `${val}`;
}
function parClass(val) {
  if (val < 0) return 'under';
  if (val > 0) return 'over';
  return 'even';
}

// ── RENDER ──
function render() {
  renderTeams();
  renderIndividual();
  renderChart();
  renderHistory();
  renderHandicaps();
}

// ── TEAM STANDINGS ──
function renderTeams() {
  const teamMap = {};
  for (const p of players) {
    if (!p.team) continue;
    if (!teamMap[p.team]) teamMap[p.team] = [];
    teamMap[p.team].push(p);
  }

  const teamData = Object.entries(teamMap).map(([name, members]) => {
    let netToPar = 0, thru = 0;
    for (const m of members) {
      const v = calcPlayerView(m, currentView);
      netToPar += v.netToPar;
      thru += v.thru;
    }

    // Last Nine logic
    const lastNine = calcLastNine(members);

    return { name, netToPar, thru, lastNine, memberCount: members.length };
  });

  teamData.sort((a, b) => a.netToPar - b.netToPar);

  const container = document.getElementById('teamCard');
  if (teamData.length === 0) {
    container.innerHTML = '<div class="empty-state">No team data available</div>';
    return;
  }

  container.innerHTML = teamData.map((t, i) => {
    const lnHtml = t.lastNine !== null
      ? `<span class="last-nine-badge ${parClass(t.lastNine)}">Last 9: ${fmtPar(t.lastNine)}</span>`
      : '';
    return `
      <div class="team-row">
        <div class="team-rank rank-${i+1}">${i+1}</div>
        <div>
          <div class="team-name">${esc(t.name)}</div>
          <div class="team-thru">Thru ${t.thru} ${lnHtml}</div>
        </div>
        <div></div>
        <div class="team-score ${parClass(t.netToPar)}">${fmtPar(t.netToPar)}</div>
      </div>`;
  }).join('');
}

// ── LAST NINE ──
function calcLastNine(members) {
  // Find the most recent completed 9-hole block where ALL team members have scores
  const checkpoints = []; // ordered list of {roundNum, half} checkpoints

  for (let rn = 1; rn <= 4; rn++) {
    checkpoints.push({ rn, half: 'front' });
    checkpoints.push({ rn, half: 'back' });
  }

  let lastComplete = null;
  for (const cp of checkpoints) {
    let allHave = true;
    let totalNetToPar = 0;
    for (const m of members) {
      const r = m.rounds[String(cp.rn)];
      if (!r) { allHave = false; break; }
      const val = cp.half === 'front' ? r.front : r.back;
      if (!val || val <= 0) { allHave = false; break; }

      const ch = getCH(m.hi, cp.rn);
      const par = getCoursePar(cp.rn) / 2;
      const hcStrokes = cp.half === 'front' ? Math.ceil(ch / 2) : Math.floor(ch / 2);
      const net = val - hcStrokes;
      totalNetToPar += (net - par);
    }
    if (allHave) lastComplete = totalNetToPar;
  }

  return lastComplete;
}

// ── INDIVIDUAL LEADERBOARD ──
function renderIndividual() {
  const data = players.map(p => {
    const v = calcPlayerView(p, currentView);
    return { player: p, ...v };
  }).filter(d => d.thru > 0);

  data.sort((a, b) => a.netToPar - b.netToPar || a.net - b.net);

  // Compute arrows
  const arrows = computeArrows(data);

  const body = document.getElementById('lbBody');
  if (data.length === 0) {
    body.innerHTML = '<div class="empty-state">No scores yet</div>';
    return;
  }

  body.innerHTML = data.map((d, i) => {
    const pos = i + 1;
    const arrowHtml = arrows[d.player.name] || '';
    return `
      <div class="lb-row" onclick="openModal('${esc(d.player.name)}')">
        <span class="lb-pos ${pos <= 3 ? 'top-3' : ''}">${pos}</span>
        <div class="lb-name-cell">
          <div class="lb-player-name">${esc(d.player.name)}${arrowHtml}</div>
          <div class="lb-team-tag">${esc(d.player.team)}</div>
        </div>
        <span class="lb-val">${d.net}</span>
        <span class="lb-val net-par ${parClass(d.netToPar)}">${fmtPar(d.netToPar)}</span>
        <span class="lb-val">${d.gross}</span>
        <span class="lb-thru">${d.thru}</span>
      </div>`;
  }).join('');
}

// ── ARROW LOGIC ──
function computeArrows(sortedData) {
  const result = {};

  if (currentView === 'tournament') {
    // Arrows update only after a full 18 is completed.
    // Show rank change vs the previous completed round.
    const currentRanks = {};
    sortedData.forEach((d, i) => { currentRanks[d.player.name] = i + 1; });

    // Find what round was most recently completed for each player
    // Compare to ranks at end of previous round
    for (const d of sortedData) {
      const name = d.player.name;
      // Check if player has completed at least one full 18
      let completedRounds = 0;
      for (let rn = 1; rn <= 4; rn++) {
        const rr = calcPlayerRound(d.player, rn);
        if (rr && rr.thru === 18) completedRounds++;
      }
      if (completedRounds < 2) continue; // Need at least 2 rounds for comparison

      if (prevRanks[name] !== undefined) {
        const diff = prevRanks[name] - currentRanks[name];
        if (diff > 0) result[name] = `<span class="arrow up">▲${diff}</span>`;
        else if (diff < 0) result[name] = `<span class="arrow down">▼${Math.abs(diff)}</span>`;
      }
    }

    // Store current ranks for next update cycle comparison
    // Only update prevRanks when a round boundary is crossed (simplified: store each time)
    // A more precise implementation would track per-round completion
    Object.assign(prevRanks, currentRanks);
  } else {
    // Round view: show rank movement for overall tournament after that round's full 18 is complete
    const roundNum = parseInt(currentView);
    if (roundNum <= 1) return result; // No arrows for R1

    for (const d of sortedData) {
      const rr = calcPlayerRound(d.player, roundNum);
      if (!rr || rr.thru < 18) continue;

      // Get rank at end of previous rounds vs including this round
      const prevView = calcTournamentThruRound(d.player, roundNum - 1);
      const currView = calcTournamentThruRound(d.player, roundNum);

      // We need all players' ranks at both points
      // Simplified: just track position changes
    }
    // Detailed arrow implementation for round view
    const prevRoundRanks = computeRanksThruRound(roundNum - 1);
    const currRoundRanks = computeRanksThruRound(roundNum);

    for (const name of Object.keys(currRoundRanks)) {
      // Only show arrow if this player completed full 18 in current round
      const player = players.find(p => p.name === name);
      if (!player) continue;
      const rr = calcPlayerRound(player, roundNum);
      if (!rr || rr.thru < 18) continue;

      const prev = prevRoundRanks[name];
      const curr = currRoundRanks[name];
      if (prev !== undefined && curr !== undefined) {
        const diff = prev - curr;
        if (diff > 0) result[name] = `<span class="arrow up">▲${diff}</span>`;
        else if (diff < 0) result[name] = `<span class="arrow down">▼${Math.abs(diff)}</span>`;
      }
    }
  }

  return result;
}

function calcTournamentThruRound(player, thruRound) {
  let net = 0, netToPar = 0, thru = 0;
  for (let rn = 1; rn <= thruRound; rn++) {
    const res = calcPlayerRound(player, rn);
    if (res) { net += res.net; netToPar += res.netToPar; thru += res.thru; }
  }
  return { net, netToPar, thru };
}

function computeRanksThruRound(thruRound) {
  const data = players.map(p => {
    const v = calcTournamentThruRound(p, thruRound);
    return { name: p.name, ...v };
  }).filter(d => d.thru > 0);
  data.sort((a, b) => a.netToPar - b.netToPar || a.net - b.net);
  const ranks = {};
  data.forEach((d, i) => { ranks[d.name] = i + 1; });
  return ranks;
}

// ── CHART ──
function renderChart() {
  const teamMap = {};
  for (const p of players) {
    if (!p.team) continue;
    if (!teamMap[p.team]) teamMap[p.team] = [];
    teamMap[p.team].push(p);
  }

  const teamNames = Object.keys(teamMap);
  if (teamNames.length < 2) return;

  // Build checkpoints: each 9-hole block where ALL players across BOTH teams have scores
  const checkpoints = [];
  for (let rn = 1; rn <= 4; rn++) {
    checkpoints.push({ rn, half: 'front', label: `R${rn} F9` });
    checkpoints.push({ rn, half: 'back', label: `R${rn} B9` });
  }

  const labels = [];
  const datasets = {};
  teamNames.forEach(t => { datasets[t] = []; });

  for (const cp of checkpoints) {
    let allHave = true;
    const teamScores = {};

    for (const tName of teamNames) {
      let teamPar = 0;
      for (const m of teamMap[tName]) {
        const r = m.rounds[String(cp.rn)];
        if (!r) { allHave = false; break; }
        const val = cp.half === 'front' ? r.front : r.back;
        if (!val || val <= 0) { allHave = false; break; }
        const ch = getCH(m.hi, cp.rn);
        const par = getCoursePar(cp.rn) / 2;
        const hcStrokes = cp.half === 'front' ? Math.ceil(ch / 2) : Math.floor(ch / 2);
        teamPar += (val - hcStrokes - par);
      }
      if (!allHave) break;
      teamScores[tName] = teamPar;
    }

    if (!allHave) break; // Stop at first incomplete checkpoint

    labels.push(cp.label);
    for (const tName of teamNames) {
      const prev = datasets[tName].length > 0 ? datasets[tName][datasets[tName].length - 1] : 0;
      datasets[tName].push(prev + teamScores[tName]);
    }
  }

  const colors = ['#3eb97f', '#c9a84c', '#4a90d9', '#d44'];
  const chartData = {
    labels,
    datasets: teamNames.map((t, i) => ({
      label: t,
      data: datasets[t],
      borderColor: colors[i % colors.length],
      backgroundColor: colors[i % colors.length] + '22',
      borderWidth: 2,
      pointRadius: 4,
      pointBackgroundColor: colors[i % colors.length],
      tension: 0.3,
      fill: false
    }))
  };

  const ctx = document.getElementById('leadChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: chartData,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          labels: { color: '#a8b5a0', font: { family: 'Outfit', size: 12 } }
        }
      },
      scales: {
        x: {
          ticks: { color: '#6b7a64', font: { family: 'Outfit', size: 11 } },
          grid: { color: 'rgba(245,240,232,0.05)' }
        },
        y: {
          ticks: { color: '#6b7a64', font: { family: 'Outfit', size: 11 } },
          grid: { color: 'rgba(245,240,232,0.06)' },
          title: { display: true, text: 'Net to Par', color: '#6b7a64', font: { family: 'Outfit' } }
        }
      }
    }
  });
}

// ── TOURNAMENT HISTORY ──
function renderHistory() {
  const grid = document.getElementById('historyGrid');
  let html = '';

  for (let rn = 1; rn <= 4; rn++) {
    const roundPlayers = players.map(p => {
      const res = calcPlayerRound(p, rn);
      return res && res.thru > 0 ? { name: p.name, ...res } : null;
    }).filter(Boolean);

    html += `<div class="history-card"><div class="history-card-title">Round ${rn}</div>`;

    if (roundPlayers.length === 0) {
      html += `<div class="history-upcoming">Upcoming</div>`;
    } else {
      // Sort by gross for gross winner, net-to-par for net winner
      const byGross = [...roundPlayers].filter(p => p.thru === 18).sort((a, b) => a.gross - b.gross);
      const byNet = [...roundPlayers].filter(p => p.thru === 18).sort((a, b) => a.netToPar - b.netToPar);

      if (byNet.length > 0) {
        html += `<div class="history-place"><span><span class="history-medal gold">1st</span>${esc(byNet[0].name)}</span><span class="history-place-score">${byNet[0].gross} / ${fmtPar(byNet[0].netToPar)}</span></div>`;
      }
      if (byNet.length > 1) {
        html += `<div class="history-place"><span><span class="history-medal silver">2nd</span>${esc(byNet[1].name)}</span><span class="history-place-score">${byNet[1].gross} / ${fmtPar(byNet[1].netToPar)}</span></div>`;
      }
      if (byNet.length === 0 && roundPlayers.length > 0) {
        html += `<div class="history-upcoming">In progress…</div>`;
      }
    }
    html += `</div>`;
  }

  grid.innerHTML = html;
}

// ── HANDICAPS TABLE ──
function renderHandicaps() {
  const body = document.getElementById('hcBody');
  body.innerHTML = players.map(p => {
    const chs = [1,2,3,4].map(rn => {
      const ch = getCH(p.hi, rn);
      return `<td class="hc-val">${ch || '—'}</td>`;
    }).join('');
    return `<tr><td class="hc-name">${esc(p.name)}</td><td class="hc-val">${p.hi}</td>${chs}</tr>`;
  }).join('');
}

// ── PLAYER MODAL ──
function openModal(name) {
  const player = players.find(p => p.name === name);
  if (!player) return;

  const modal = document.getElementById('modal');
  document.getElementById('modalName').textContent = player.name;
  document.getElementById('modalTeam').textContent = player.team;

  const v = calcPlayerView(player, currentView);
  document.getElementById('modalStats').innerHTML = `
    <div class="modal-stat"><div class="modal-stat-label">Net</div><div class="modal-stat-val">${v.net || '—'}</div></div>
    <div class="modal-stat"><div class="modal-stat-label">Gross</div><div class="modal-stat-val">${v.gross || '—'}</div></div>
    <div class="modal-stat"><div class="modal-stat-label">To Par</div><div class="modal-stat-val ${parClass(v.netToPar)}">${v.thru > 0 ? fmtPar(v.netToPar) : '—'}</div></div>
    <div class="modal-stat"><div class="modal-stat-label">Thru</div><div class="modal-stat-val">${v.thru || '—'}</div></div>`;

  let roundsHtml = '';
  if (currentView === 'tournament') {
    document.getElementById('modalRoundsTitle').textContent = 'Round Breakdown (Gross)';
    for (let rn = 1; rn <= 4; rn++) {
      const res = calcPlayerRound(player, rn);
      roundsHtml += `<div class="modal-round-row">
        <span class="modal-round-label">Round ${rn}</span>
        <span class="modal-round-val">${res && res.thru > 0 ? res.gross : '—'}</span>
      </div>`;
    }
    document.getElementById('modalSummary').textContent = `Handicap Index: ${player.hi}`;
  } else {
    const rn = parseInt(currentView);
    document.getElementById('modalRoundsTitle').textContent = `Round ${rn} Detail (Gross)`;
    const res = calcPlayerRound(player, rn);
    if (res) {
      roundsHtml += `<div class="modal-round-row"><span class="modal-round-label">Front Nine</span><span class="modal-round-val">${res.hasFront ? res.frontGross : '—'}</span></div>`;
      roundsHtml += `<div class="modal-round-row"><span class="modal-round-label">Back Nine</span><span class="modal-round-val">${res.hasBack ? res.backGross : '—'}</span></div>`;
    }
    const ch = getCH(player.hi, rn);
    document.getElementById('modalSummary').textContent = `Course Handicap: ${ch}`;
  }

  document.getElementById('modalRounds').innerHTML = roundsHtml;
  modal.classList.add('open');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// ── VIEW CONTROLS ──
document.querySelectorAll('#viewBtns .ctrl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#viewBtns .ctrl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    lastCSV = ''; // Force re-render
    render();
  });
});

// ── UTILITY ──
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
